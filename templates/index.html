<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelFoodie | AI Recipe Finder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root { 
            --bg: #0a0a0b; 
            --glass: rgba(26, 26, 28, 0.7); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4757; 
            --accent-hover: #ff6b81;
            --gold: #f5b041; 
            --text: #ffffff; 
            --secondary: #cccccc; 
        }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('/static/bg.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            margin: 0; 
            min-height: 100vh;
        }
        
        h1 { 
            font-size: clamp(32px, 8vw, 64px); 
            font-weight: 800; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-text { color: var(--accent); }
        .sub-text { 
            color: var(--gold); 
            font-size: 12px; 
            font-weight: 600; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .search-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-container:focus-within {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 25px 50px rgba(255, 71, 87, 0.2);
        }

        input { 
            background: transparent;
            border: none; 
            color: white; 
            padding: 15px 25px; 
            flex: 1;
            font-size: 18px; 
            font-family: inherit;
            outline: none; 
        }
        
        button#searchBtn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 15px 35px; 
            border-radius: 40px; 
            font-family: inherit;
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            transition: 0.3s; 
        }
        button#searchBtn:hover { 
            background: var(--accent-hover); 
            transform: translateX(5px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 1200px; 
            margin-top: 60px; 
        }

        .recipe-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.6s ease-out backwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
        }

        .match-badge { 
            color: var(--gold); 
            font-weight: 800; 
            font-size: 13px; 
            letter-spacing: 2px;
            background: rgba(245, 176, 65, 0.1);
            padding: 5px 12px;
            border-radius: 8px;
            width: fit-content;
        }

        .recipe-title {
            margin: 0;
            font-size: 22px;
            line-height: 1.3;
            font-weight: 700;
        }

        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
        }
        .modal-content { 
            background: #151517; 
            margin: 50px auto; 
            padding: 50px; 
            border-radius: 32px; 
            width: 90%; 
            max-width: 800px; 
            max-height: 85vh; 
            overflow-y: auto; 
            border: 1px solid var(--glass-border); 
            position: relative; 
            animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        @keyframes modalPop { 
            from { transform: scale(0.8); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }
        .close-btn { 
            position: absolute; 
            right: 30px; top: 25px; 
            font-size: 32px; 
            color: var(--secondary); 
            cursor: pointer; 
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        .modal-btn { 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 10px 20px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 600;
            cursor: pointer; 
            font-family: inherit;
            transition: 0.3s; 
            align-self: flex-start;
        }
        .modal-btn:hover { background: var(--accent); color: white; }
        
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
            font-family: inherit;
        }
        .back-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    <button class="back-btn" id="backBtn" onclick="resetSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back
    </button>

    <h1>PIXEL<span class="brand-text">FOODIE</span></h1>
    <p class="sub-text">The Gold Standard AI Recipe Finder</p>
    
    <div class="search-container">
        <input type="text" id="userInput" placeholder="Enter ingredients (e.g. Paneer, Tomato, Onion)" onkeypress="if(event.key === 'Enter') searchRecipe()">
        <button id="searchBtn" onclick="searchRecipe()">Find Recipes</button>
    </div>

    <div class="grid" id="recipeResults"></div>

    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--accent); font-size: clamp(24px, 5vw, 36px); margin-top: 0; line-height: 1.2;"></h2>
            <div style="height: 1px; background: var(--glass-border); margin: 30px 0;"></div>
            <h3 style="color: var(--gold); text-transform: uppercase; font-size: 14px; letter-spacing: 2px;">Cooking Instructions</h3>
            <p id="modalInstructions" style="color: var(--secondary); line-height: 1.9; font-size: 18px; white-space: pre-wrap; font-weight: 300;"></p>
        </div>
    </div>

    <script>
        let recipesData = [];

        async function searchRecipe() {
            const container = document.getElementById('recipeResults');
            const input = document.getElementById('userInput').value;
            const backBtn = document.getElementById('backBtn');

            if(!input) return alert("Ingredients type pannunga anna!");

            container.innerHTML = '<p id="loadingText" style="color: var(--gold); font-size: 18px; font-weight: 600; text-align: center; width: 100%; grid-column: 1/-1;">Processing with ML Model...</p>';
            backBtn.style.display = "flex";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ingredients: input })
                });
                const recipes = await response.json();
                recipesData = recipes;
                
                if (recipes.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; width: 100%; grid-column: 1 / -1;">
                            <h3 style="color: var(--accent);">Oops! No matches found 😔</h3>
                            <p style="color: var(--secondary);">We couldn't find any recipes with "${input}". Please check the spelling or try different ingredients!</p>
                        </div>`;
                    return;
                }
                
                container.innerHTML = recipes.map((r, index) => `
                    <div class="recipe-card" onclick="openModal(${index})">
                        <span class="match-badge">${r.match} MATCH</span>
                        <h3 class="recipe-title">${r.recipe_name}</h3>
                        <p style="color: var(--secondary); font-size: 14px; opacity: 0.7;">Click to view full recipe steps...</p>
                        <button class="modal-btn">How to Cook</button>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `<p style="color: var(--accent); text-align: center; width: 100%; grid-column: 1 / -1;">Backend Error! Check your connection.</p>`;
            }
        }

        function resetSearch() {
            document.getElementById('recipeResults').innerHTML = '';
            document.getElementById('userInput').value = '';
            document.getElementById('backBtn').style.display = 'none';
        }

        function openModal(index) {
            const recipe = recipesData[index];
            if (!recipe) return;
            
            document.getElementById('modalTitle').innerText = recipe.recipe_name;
            document.getElementById('modalInstructions').innerText = recipe.instructions;
            document.getElementById('recipeModal').style.display = "block";
            document.body.style.overflow = "hidden"; 
        }

        function closeModal() {
            document.getElementById('recipeModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('recipeModal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
